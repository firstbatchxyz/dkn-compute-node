name: rocm hotfix

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to patch (e.g. v0.7.3)"
        required: true
        default: "v0.7.3"

permissions:
  contents: write

env:
  RELEASE_TAG: "${{ github.event.inputs.tag }}"

jobs:
  build-rocm:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install ROCm HIP SDK
        run: |
          wget -q -O - https://repo.radeon.com/rocm/rocm.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/rocm.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/6.3.3 jammy main" | sudo tee /etc/apt/sources.list.d/rocm.list
          printf 'Package: *\nPin: release o=repo.radeon.com\nPin-Priority: 600\n' | sudo tee /etc/apt/preferences.d/rocm-pin-600
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake hip-dev rocm-hip-runtime-dev hipblas-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary with ROCm
        run: cargo build --bin dria-node --release --target x86_64-unknown-linux-gnu --features rocm

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-gnu/release/dria-node

      - name: Prepare release file
        run: mv target/x86_64-unknown-linux-gnu/release/dria-node ./dria-node-linux-amd64-rocm

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dria-node-linux-amd64-rocm
          path: dria-node-linux-amd64-rocm

      - name: Attach asset to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          gh release upload "${RELEASE_TAG}" ./dria-node-linux-amd64-rocm --clobber --repo "${GITHUB_REPOSITORY}"
